<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="referrer" content="no-referrer">
<title>ADR Barber System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1:#0a0a0f; --bg2:#111118; --bg3:#1a1a24; --bg4:#22222f;
    --border:#2a2a3a; --purple:#7c3aed; --purple-light:#9d5cf6;
    --purple-glow:rgba(124,58,237,0.25); --gold:#f59e0b; --gold-dark:#d97706;
    --green:#22c55e; --red:#ef4444; --text:#f0f0f8; --text2:#8888aa;
    --text3:#4a4a6a; --radius:14px; --sidebar-w:240px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Outfit',sans-serif;background:var(--bg1);color:var(--text);min-height:100vh;}

  /* ── KEYFRAMES ── */
  @keyframes fadeInDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeInUp  {from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn    {from{opacity:0}to{opacity:1}}
  @keyframes scaleIn   {from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
  @keyframes slideUp   {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer   {0%{background-position:-200% center}100%{background-position:200% center}}
  @keyframes pulseGlow {0%,100%{box-shadow:0 0 16px var(--purple-glow)}50%{box-shadow:0 0 32px rgba(124,58,237,.5)}}
  @keyframes spin      {to{transform:rotate(360deg)}}
  @keyframes shake     {0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

  /* ══════════════════════════════════════
     LOGIN SCREEN
  ══════════════════════════════════════ */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 0%, rgba(124,58,237,.18) 0%, transparent 70%),var(--bg1);
    animation:fadeIn .5s ease both;
  }
  #login-screen.hidden{display:none;}
  .login-box {
    width:100%; max-width:420px; padding:40px;
    background:var(--bg2); border:1px solid var(--border);
    border-radius:24px; box-shadow:0 32px 80px rgba(0,0,0,.6);
    animation:scaleIn .45s ease both;
  }
  .login-logo {
    display:flex; align-items:center; justify-content:center; gap:14px;
    margin-bottom:32px;
  }
  .login-logo-icon {
    width:52px; height:52px; border-radius:14px;
    background:linear-gradient(135deg,#7c3aed,#4f1fe8);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:18px; color:#fff;
    box-shadow:0 8px 24px rgba(124,58,237,.5);
  }
  .login-logo-text strong{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;display:block;}
  .login-logo-text span{font-size:10px;font-weight:600;letter-spacing:3px;color:var(--purple-light);text-transform:uppercase;}

  .role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:28px;}
  .role-tab {
    padding:12px; border-radius:10px; border:1px solid var(--border);
    background:var(--bg3); cursor:pointer; text-align:center;
    font-size:14px; font-weight:600; color:var(--text2);
    transition:all .2s;
  }
  .role-tab.active{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 4px 16px var(--purple-glow);}
  .role-tab:hover:not(.active){background:var(--bg4);color:var(--text);}

  .login-form-title{font-size:13px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;}
  .login-group{margin-bottom:16px;position:relative;}
  .login-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;}
  .login-input {
    width:100%; padding:12px 16px; border-radius:10px;
    background:var(--bg3); border:1px solid var(--border);
    color:var(--text); font-family:'Outfit',sans-serif; font-size:15px;
    outline:none; transition:border-color .2s, box-shadow .2s;
  }
  .login-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-glow);}
  .login-input.error{border-color:var(--red);animation:shake .4s ease;}
  .login-btn {
    width:100%; padding:14px; border-radius:10px; border:none;
    background:var(--purple); color:#fff;
    font-family:'Outfit',sans-serif; font-size:15px; font-weight:700;
    cursor:pointer; transition:all .2s; margin-top:8px;
    box-shadow:0 4px 20px var(--purple-glow);
  }
  .login-btn:hover{background:var(--purple-light);transform:translateY(-2px);}
  .login-btn:active{transform:translateY(0);}
  .login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
  /* ── SHOW PASSWORD TOGGLE ── */
  .pass-wrap{position:relative;}
  .pass-wrap .login-input{padding-right:44px;}
  .pass-wrap .form-input{padding-right:44px;}
  .pass-toggle{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;padding:4px;
    color:var(--text3);transition:color .2s;display:flex;align-items:center;
  }
  .pass-toggle:hover{color:var(--purple-light);}
  .pass-toggle svg{pointer-events:none;}

  .login-error{
    font-size:12px; color:var(--red); background:rgba(239,68,68,.1);
    border:1px solid rgba(239,68,68,.2); border-radius:8px;
    padding:10px 14px; margin-top:12px; display:none;
    animation:fadeIn .3s ease;
  }
  .login-error.show{display:block;}
  .lockout-msg{font-size:12px;color:var(--gold);text-align:center;margin-top:10px;display:none;}
  .lockout-msg.show{display:block;}
  .login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:16px;}

  /* ══════════════════════════════════════
     MAIN APP
  ══════════════════════════════════════ */
  #app{display:none;}
  #app.show{display:flex;flex-direction:column;min-height:100vh;}

  /* ── TOPBAR ── */
  .topbar {
    position:fixed;top:0;left:0;right:0;z-index:100;height:64px;
    background:rgba(10,10,15,.97);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 20px;gap:8px;
    animation:fadeInDown .4s ease both;
  }
  .logo{display:flex;align-items:center;gap:10px;margin-right:24px;text-decoration:none;}
  .logo-icon{
    width:40px;height:40px;border-radius:10px;
    background:linear-gradient(135deg,#7c3aed,#4f1fe8);
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',sans-serif;font-size:14px;color:#fff;
    box-shadow:0 4px 12px rgba(124,58,237,.4);flex-shrink:0;transition:transform .3s;
  }
  .logo:hover .logo-icon{transform:rotate(10deg) scale(1.08);}
  .logo-text strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;}
  .logo-text span{font-size:9px;font-weight:600;letter-spacing:3px;color:var(--purple-light);text-transform:uppercase;}
  .topnav{display:flex;gap:4px;flex:1;}
  .topnav a{
    padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;
    color:var(--text2);cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;
  }
  .topnav a:hover{color:var(--text);background:var(--bg3);}
  .topnav a.active{color:#fff;background:var(--purple);animation:pulseGlow 2.5s ease-in-out infinite;}
  .topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
  .role-badge{
    font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    padding:4px 10px;border-radius:20px;
  }
  .role-badge.owner{background:rgba(245,158,11,.15);color:var(--gold);}
  .role-badge.client{background:var(--purple-glow);color:var(--purple-light);}
  .avatar{
    width:36px;height:36px;border-radius:50%;
    background:linear-gradient(135deg,var(--purple),var(--gold));
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;
  }
  .avatar:hover{transform:scale(1.1);box-shadow:0 4px 16px var(--purple-glow);}
  .logout-btn{
    padding:7px 14px;border-radius:8px;border:1px solid var(--border);
    background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;
    font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;
    display:flex;align-items:center;gap:6px;
  }
  .logout-btn:hover{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red);}

  /* ── SIDEBAR ── */
  .sidebar{
    width:var(--sidebar-w);flex-shrink:0;
    position:fixed;top:64px;left:0;bottom:0;
    background:var(--bg2);border-right:1px solid var(--border);
    overflow-y:auto;padding:16px 12px;
    display:flex;flex-direction:column;gap:2px;
  }
  .sidebar-group{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding:12px 8px 6px;margin-top:8px;}
  .sidebar a{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
    font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;text-decoration:none;transition:all .2s;
  }
  .sidebar a:hover{color:var(--text);background:var(--bg3);transform:translateX(2px);}
  .sidebar a.active{color:#fff;background:var(--purple);box-shadow:0 0 20px var(--purple-glow);}
  .sidebar a svg{flex-shrink:0;width:18px;height:18px;transition:transform .2s;}
  .sidebar a:hover svg{transform:scale(1.15);}

  /* ── LAYOUT ── */
  .layout{display:flex;padding-top:64px;min-height:100vh;}
  .main{margin-left:var(--sidebar-w);flex:1;padding:28px;max-width:calc(100vw - var(--sidebar-w));}

  /* ── PAGES ── */
  .page{display:none;}
  .page.active{display:block;animation:fadeInUp .35s ease both;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;}
  .page-sub{color:var(--text2);font-size:14px;margin-top:2px;}

  /* ── BUTTONS ── */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
  .btn-primary{background:var(--purple);color:#fff;box-shadow:0 4px 16px var(--purple-glow);}
  .btn-primary:hover{background:var(--purple-light);transform:translateY(-2px);}
  .btn-gold{background:var(--gold);color:#000;}
  .btn-gold:hover{background:var(--gold-dark);transform:translateY(-2px);}
  .btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--text);background:var(--bg4);transform:translateY(-1px);}
  .btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2);}
  .btn-danger:hover{background:rgba(239,68,68,.2);}

  /* ── CARDS ── */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
  .card{
    background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;position:relative;overflow:hidden;
    transition:border-color .2s,transform .25s,box-shadow .25s;
    animation:scaleIn .4s ease both;
  }
  .card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}
  .card:nth-child(3){animation-delay:.15s}.card:nth-child(4){animation-delay:.2s}
  .card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--purple-glow),transparent);opacity:0;transition:opacity .3s;pointer-events:none;}
  .card:hover{border-color:var(--purple);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
  .card:hover::before{opacity:1;}
  .card-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
  .card-value{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;color:var(--text);}
  .card-value.small{font-size:28px;}
  .card-sub{font-size:12px;color:var(--text3);margin-top:6px;}

  /* ── EMPTY STATE ── */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);text-align:center;}
  .empty-state svg{margin-bottom:16px;opacity:.4;}
  .empty-state h3{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px;}
  .empty-state p{font-size:13px;line-height:1.6;max-width:280px;}

  /* ── PLANS ── */
  .plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-top:24px;}
  .plan-card{
    background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px;
    position:relative;transition:all .3s;animation:fadeInUp .4s ease both;
  }
  .plan-card:nth-child(1){animation-delay:.05s}.plan-card:nth-child(2){animation-delay:.15s}.plan-card:nth-child(3){animation-delay:.25s}
  .plan-card:hover{transform:translateY(-6px);border-color:var(--purple);box-shadow:0 16px 40px rgba(0,0,0,.5);}
  .plan-card.popular{border-color:var(--gold);background:linear-gradient(135deg,rgba(245,158,11,.05),var(--bg2));box-shadow:0 0 40px rgba(245,158,11,.1);}
  .plan-card.popular:hover{border-color:var(--gold);box-shadow:0 16px 48px rgba(245,158,11,.2);}
  .plan-badge{
    position:absolute;top:-12px;right:20px;color:#000;
    font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 12px;border-radius:20px;
    background-size:200% auto;
    background-image:linear-gradient(90deg,var(--gold) 0%,#fde68a 50%,var(--gold) 100%);
    animation:shimmer 3s linear infinite;
  }
  .plan-tier{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
  .plan-price{display:flex;align-items:flex-end;gap:4px;margin-bottom:6px;}
  .plan-currency{font-size:20px;font-weight:700;color:var(--text2);padding-bottom:8px;}
  .plan-amount{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:var(--text);}
  .plan-period{font-size:14px;color:var(--text3);padding-bottom:10px;}
  .plan-subs{font-size:13px;color:var(--text2);margin-bottom:20px;padding:8px 12px;background:var(--bg3);border-radius:8px;}
  .plan-subs strong{color:var(--purple-light);}
  .plan-features{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .plan-feature{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);}
  .plan-feature svg{color:var(--purple-light);flex-shrink:0;}
  .plan-card.popular .plan-feature svg{color:var(--gold);}
  .plan-btn{
    width:100%;padding:13px;border-radius:10px;
    font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;
    cursor:pointer;border:1px solid var(--border);
    background:var(--bg3);color:var(--text2);transition:all .2s;
  }
  .plan-btn:hover{background:var(--bg4);color:var(--text);transform:translateY(-1px);}
  .plan-card.popular .plan-btn{background:var(--gold);color:#000;border-color:transparent;box-shadow:0 4px 20px rgba(245,158,11,.3);}
  .plan-card.popular .plan-btn:hover{background:var(--gold-dark);}

  /* ── SECTION ── */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .section-title{font-size:16px;font-weight:700;}

  /* ── TABLE ── */
  .table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:fadeInUp .4s ease both;animation-delay:.1s;}
  table{width:100%;border-collapse:collapse;}
  thead tr{border-bottom:1px solid var(--border);}
  th{padding:14px 18px;text-align:left;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}
  td{padding:14px 18px;font-size:14px;color:var(--text2);border-bottom:1px solid var(--border);transition:background .15s;}
  tr:last-child td{border-bottom:none;}
  tbody tr{animation:fadeIn .3s ease both;}
  tbody tr:hover td{background:var(--bg3);}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px;}
  .badge-green{background:rgba(34,197,94,.12);color:var(--green);}
  .badge-red{background:rgba(239,68,68,.12);color:var(--red);}
  .badge-purple{background:var(--purple-glow);color:var(--purple-light);}
  .badge-gold{background:rgba(245,158,11,.12);color:var(--gold);}
  .badge-blue{background:rgba(59,130,246,.12);color:#60a5fa;}

  /* ── SEARCH ── */
  .search-bar{display:flex;gap:12px;margin-bottom:20px;}
  .search-input{
    flex:1;padding:10px 16px;border-radius:10px;
    background:var(--bg2);border:1px solid var(--border);
    color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
    outline:none;transition:border-color .2s,box-shadow .2s;
  }
  .search-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-glow);}
  .search-input::placeholder{color:var(--text3);}

  /* ── STATS ROW ── */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}

  /* ── MODAL ── */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px;width:480px;max-width:95vw;position:relative;animation:slideUp .25s ease;}
  .modal-title{font-size:20px;font-weight:700;margin-bottom:20px;}
  .modal-close{position:absolute;top:18px;right:18px;background:var(--bg3);border:none;color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s;}
  .modal-close:hover{background:var(--bg4);color:var(--text);transform:rotate(90deg);}
  .form-group{margin-bottom:16px;}
  .form-label{display:block;font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--text2);margin-bottom:6px;}
  .form-input{width:100%;padding:10px 14px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
  .form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-glow);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end;}

  /* ── PAYMENT PORTAL (CLIENT) ── */
  .payment-card{
    background:var(--bg2);border:1px solid var(--border);border-radius:20px;
    padding:32px;max-width:520px;margin:0 auto;animation:scaleIn .4s ease both;
  }
  .payment-status-banner{
    padding:16px 20px;border-radius:12px;margin-bottom:24px;
    display:flex;align-items:center;gap:14px;font-weight:600;
  }
  .payment-status-banner.active{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--green);}
  .payment-status-banner.pending{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--gold);}
  .payment-status-banner.inactive{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red);}
  .mp-btn{
    width:100%;padding:16px;border-radius:12px;border:none;
    background:linear-gradient(135deg,#009ee3,#00b1f5);color:#fff;
    font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;
    cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 8px 24px rgba(0,158,227,.3);margin-top:24px;
  }
  .mp-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,158,227,.4);}
  .mp-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
  .mp-logo{font-size:13px;opacity:.8;}
  .security-note{
    display:flex;align-items:center;gap:8px;margin-top:16px;
    font-size:12px;color:var(--text3);justify-content:center;
  }

  /* ── VIP ── */
  .vip-banner{
    background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(124,58,237,.15));
    border:1px solid rgba(245,158,11,.3);border-ra
